<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WebPay - Reset Password</title>
    {% load static %}
    <link rel="stylesheet" href="{% static 'css/styles_login.css' %}">
</head>
<body>
    <div class="container">
        <div class="logo-wrapper">
            <img src="{% static 'images/logo_greenbg.jpg' %}" alt="WebPay Logo" class="logo-image">
        </div>
        <h1>Forgot Your Password?</h1>
        <div class="subtitle">Enter your email address below, and we'll send a link to reset your password.</div>

        <form method="post">
            {% csrf_token %}
            {{ form.as_p }}
            <div class="text-center">
                <button type="submit" class="btn">Send Reset Link</button>
            </div>
        </form>
    </div>
</body>
</html>
