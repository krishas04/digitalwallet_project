<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WebPay - Reset Complete</title>
    {% load static %}
    <link rel="stylesheet" href="{% static 'css/styles_login.css' %}">
</head>
<body>
    <div class="container">
        <div class="logo-wrapper">
            <img src="{% static 'images/logo_greenbg.jpg' %}" alt="WebPay Logo" class="logo-image">
        </div>
        <div class="text-center"><h2>Password Reset Completed</h2></div>
       
        <div class="subtitle">
            <p>Your password has been changed. You can now log in with your new password.</p>
        </div>
        <div class="text-center">
            <a href="{% url 'users:login' %}" class="btn">Login</a>
        </div>
    </div>
</body>
</html>
