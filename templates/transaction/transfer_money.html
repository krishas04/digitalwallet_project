{% extends 'base_dashboard.html' %}
{% load static %}

{% block content %}
<div class="content-card">
    <h2 class="section-title">Transfer Money</h2>
    <p>Send money to another user securely.</p>

    <!-- Display any messages from the backend -->
    {% if messages %}
        {% for message in messages %}
            <div class="alert alert-{{ message.tags }}" style="padding: 10px; margin: 10px 0; border-radius: 5px; background-color: #f8d7da; color: #721c24; border: 1px solid #f5c6cb;">
                {{ message }}
            </div>
        {% endfor %}
    {% endif %}

    <form action="{% url 'transaction:transfer_money_initiate' %}" method="POST" style="margin-top: 30px;">
        {% csrf_token %}
        <div class="form-group" style="margin-bottom: 20px;">
            <label for="recipient-email" style="display: block; margin-bottom: 5px; font-weight: bold;">Recipient's Email</label>
            <input type="email" id="recipient-email" name="recipient_email" placeholder="e.g., friend@example.com" required style="padding: 12px; width: 100%; max-width: 400px; font-size: 16px; border-radius: 5px; border: 1px solid #ccc; box-sizing: border-box;">
        </div>
        <div class="form-group" style="margin-bottom: 20px;">
            <label for="transfer-amount" style="display: block; margin-bottom: 5px; font-weight: bold;">Amount (Rs.)</label>
            <input type="number" id="transfer-amount" name="amount" placeholder="e.g., 500" step="0.01" min="1" required style="padding: 12px; width: 100%; max-width: 400px; font-size: 16px; border-radius: 5px; border: 1px solid #ccc; box-sizing: border-box;">
        </div>
        <button type="submit" class="btn btn-success" style="padding: 12px 25px; background-color: #5cb85c; color: white; border: none; border-radius: 5px; cursor: pointer; font-size: 16px; font-weight: bold;">
            Transfer Now
        </button>
    </form>
</div>
{% endblock %}
